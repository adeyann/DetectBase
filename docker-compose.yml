version: "3.8"

# 'services' 블록은 이 Compose 파일로 관리될 컨테이너(서비스)들을 정의합니다.
services:
  # 'detectbase_server' 는 서비스의 이름입니다.
  detectbase_server:
    # 'build' 섹션: docker-compose build 시 Dockerfile.build 로 이미지 생성.
    # CLAUDE.md "docker-compose: 빌드 이미지명과 서비스 이미지명 동일해야 함" 준수.
    build:
      context: .
      dockerfile: Dockerfile.build

    # 'image' 는 이 서비스를 생성하는 데 사용될 Docker 이미지를 지정합니다.
    # build 섹션과 동일 이름으로 빌드 + 사용을 일치시킵니다.
    image: detectbase:1.0

    # 'container_name' 은 생성될 컨테이너의 이름을 명시적으로 지정합니다.
    # 지정하지 않으면 Docker Compose가 프로젝트명_서비스명_번호 형태로 자동 생성합니다.
    # 고정된 이름을 사용하면 스크립트 등에서 컨테이너를 참조하기 용이합니다.
    container_name: detectbase_service

    # 'cap_add' 는 컨테이너에 특정 Linux 커널 케이퍼빌리티(capabilities)를 추가합니다.
    # 'SYS_PTRACE' 는 프로세스 추적(ptrace) 권한을 부여하며, 디버깅 등에 필요할 수 있습니다.
    cap_add:
      - SYS_PTRACE

    # 'privileged: true' : Odroid M2 의 rknpu 드라이버 0.9.8 은 sysfs/dev 통합이 제한적이라
    #   비특권 컨테이너에서는 /dev/dri/renderD129 가 보여도 rknn_init() 가 NPU 모듈 오픈에 실패한다.
    #   privileged 모드로 띄워야 librknnrt.so 가 NPU 드라이버에 정상 접근 가능하다.
    #   (privileged 가 이미 모든 syscall 허용하므로 별도 seccomp 옵션 불필요)
    privileged: true

    # 'network_mode' 는 컨테이너의 네트워크 설정을 지정합니다.
    # 'host' 로 설정하면 컨테이너가 호스트의 네트워크 스택을 직접 사용합니다.
    # RTSP 프록시 / SocketIO 등 다양한 포트 사용에 편리합니다.
    network_mode: host

    # 'devices' : 호스트의 NPU 디바이스를 컨테이너에 노출합니다.
    # Odroid M2 의 rknpu 드라이버는 /dev/dri/renderD129 를 생성합니다.
    # CLAUDE.md "NPU: insmod rknpu.ko → /dev/dri/renderD129 필요" 참조.
    # P61: NPU device 경로 외부화. 다른 보드/환경에서 .env 의 NPU_DEVICE_PATH 만 변경하면 적용됨.
    devices:
      - ${NPU_DEVICE_PATH:-/dev/dri/renderD129}:${NPU_DEVICE_PATH:-/dev/dri/renderD129}

    # 'volumes' 는 호스트의 디렉토리/파일을 컨테이너 내부 경로로 마운트합니다.
    volumes:
      # 호스트의 시간대 설정을 컨테이너와 동기화합니다. (읽기 전용)
      - /etc/localtime:/etc/localtime:ro

      # PWD 환경 변수(docker-compose.yml 파일이 있는 디렉토리) 또는 현재 디렉토리(.)를
      # 컨테이너 내부의 /DetectBase 경로로 마운트합니다. 코드/세팅/bin 공유.
      - ${PWD:-.}:/DetectBase

      # NPU 런타임 라이브러리:
      # 호스트 rknpu 드라이버 0.9.8 과 호환되는 코드 동봉본 1.5.2 를 컨테이너 내부 라이브러리(2.3.2) 위에 덮어쓴다.
      # Dockerfile.build 가 git clone 으로 가져오는 최신 2.3.2 는 신형 드라이버 전제이므로 본 호스트에서는 rknn_init() 실패.
      - ./code/Engine/NPU/librknn_api/aarch64/librknnrt.so:/usr/local/lib/librknnrt.so:ro

      # 이벤트 결과 이미지 저장 디렉토리 (DETECTOR 분기에서 사용).
      # IMAGE_ROOT_PATH 환경 변수가 미설정이면 ./image_root 로 폴백.
      - ${IMAGE_ROOT_PATH:-./image_root}/frame:/frame
      - ${IMAGE_ROOT_PATH:-./image_root}/crop:/crop

    # 'command' 는 컨테이너 시작 시 실행할 명령입니다.
    command: ["/DetectBase/bin/DetectBase"]

    # 'stop_signal' : docker stop 시 보낼 신호. DetectBase 바이너리는 Main.cpp 에서
    #   SIGINT 핸들러를 등록하여 graceful PROGRAM QUIT 절차를 수행하므로 SIGINT 사용.
    stop_signal: SIGINT

    # 'stop_grace_period' : SIGINT 송신 후 SIGKILL 까지 대기 시간.
    #   DetectBase 종료 절차 (#01~#05) 가 완료되도록 30초 부여.
    stop_grace_period: 30s

    # 'shm_size' 는 /dev/shm (공유 메모리) 크기 (영상 처리/멀티스레드 용).
    shm_size: 1024m

    # 'environment' 는 컨테이너 내부 환경변수.
    environment:
      # 컨테이너의 시간대를 'Asia/Seoul' 로 설정합니다.
      TZ: Asia/Seoul

      # jemalloc 활성화 (2026-05-14 도입). 코드 변경 0, LD_PRELOAD 방식.
      # 효과:
      #   - glibc malloc 의 thread arena 단편화 자체를 감소
      #   - W-14 (malloc_trim) 와 상호 보완 (W-14 = 강제 회수, jemalloc = 단편화 ↓)
      # 검증:
      #   ldd /DetectBase/bin/DetectBase 시 libjemalloc.so.2 가 먼저 로드되어야 함
      LD_PRELOAD: /usr/lib/aarch64-linux-gnu/libjemalloc.so.2

      # jemalloc 튜닝 (선택):
      #   - background_thread: 메모리 회수를 백그라운드 스레드가 수행 (latency 안정)
      #   - metadata_thp:auto : 메타데이터에 Transparent Huge Pages 사용 (TLB miss ↓)
      MALLOC_CONF: background_thread:true,metadata_thp:auto

    # 'restart' : 재시작 정책. 'unless-stopped' = 수동 중지 외에는 항상 재시작.
    restart: unless-stopped
